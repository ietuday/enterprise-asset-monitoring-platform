global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/alert-rules.yml
  - /etc/prometheus/rules/dynamic-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "asset-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["asset-service:5001"]

  - job_name: "telemetry-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["telemetry-service:5002"]

  - job_name: "alert-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["alert-service:5003"]