        labels:
          severity: high
        annotations:
          summary: "High Memory Usage"
          description: "Dynamic rule High Memory Usage triggered for asset {{ $labels.asset_id }}"
          asset_id: "{{ $labels.asset_id }}"
          alert_name: "High Memory Usage"
