services:
  postgres:
    image: postgres:16
    container_name: monitoring-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: monitoring-redis
    restart: always
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: monitoring-prometheus
    restart: always
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/rules:/etc/prometheus/rules
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    depends_on:
      - alertmanager

  asset-service:
    build:
      context: ./services/asset-service
      dockerfile: Dockerfile
    container_name: monitoring-asset-service
    restart: always
    environment:
      PORT: ${ASSET_SERVICE_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "${ASSET_SERVICE_PORT}:5001"
    depends_on:
      - postgres

  telemetry-service:
    build:
      context: ./services/telemetry-service
      dockerfile: Dockerfile
    container_name: monitoring-telemetry-service
    restart: always
    environment:
      PORT: ${TELEMETRY_SERVICE_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      ALERT_SERVICE_URL: ${ALERT_SERVICE_URL}
      RULE_SERVICE_URL: ${RULE_SERVICE_URL}
      ENABLE_DIRECT_ALERTING: ${ENABLE_DIRECT_ALERTING}
    ports:
      - "${TELEMETRY_SERVICE_PORT}:5002"
    depends_on:
      - postgres
      - alert-service
      - rule-service

  alert-service:
    build:
      context: ./services/alert-service
      dockerfile: Dockerfile
    container_name: monitoring-alert-service
    restart: always
    environment:
      PORT: ${ALERT_SERVICE_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      NOTIFICATION_SERVICE_URL: http://notification-service:8090
      SLA_WORKER_ENABLED: ${SLA_WORKER_ENABLED:-true}
      SLA_CHECK_INTERVAL_SECONDS: ${SLA_CHECK_INTERVAL_SECONDS:-60}
    ports:
      - "${ALERT_SERVICE_PORT}:5003"
    depends_on:
      - postgres
      - notification-service

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: monitoring-notification-service
    restart: always
    environment:
      PORT: ${NOTIFICATION_SERVICE_PORT:-8090}
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT:-8090}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8090}:8090"
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"

  maintenance-service:
    build:
      context: ./services/maintenance-service
      dockerfile: Dockerfile
    container_name: monitoring-maintenance-service
    restart: always
    environment:
      PORT: ${MAINTENANCE_SERVICE_PORT:-8087}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    ports:
      - "${MAINTENANCE_SERVICE_PORT:-8087}:8087"
    depends_on:
      - postgres

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: monitoring-auth-service
    restart: always
    environment:
      PORT: ${AUTH_SERVICE_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${AUTH_SERVICE_PORT}:4001"
    depends_on:
      - postgres

  report-service:
    build:
      context: ./services/report-service
      dockerfile: Dockerfile
    container_name: monitoring-report-service
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${REPORT_SERVICE_PORT}:8000"
    depends_on:
      - postgres

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: monitoring-api-gateway
    restart: always
    environment:
      PORT: ${API_GATEWAY_PORT}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      ASSET_SERVICE_URL: ${ASSET_SERVICE_URL}
      TELEMETRY_SERVICE_URL: ${TELEMETRY_SERVICE_URL}
      ALERT_SERVICE_URL: ${ALERT_SERVICE_URL}
      REPORT_SERVICE_URL: ${REPORT_SERVICE_URL}
      RULE_SERVICE_URL: ${RULE_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: http://notification-service:8090
      MAINTENANCE_SERVICE_URL: http://maintenance-service:8087
    ports:
      - "${API_GATEWAY_PORT}:4000"
    depends_on:
      - auth-service
      - asset-service
      - telemetry-service
      - alert-service
      - notification-service
      - maintenance-service
      - report-service
      - rule-service

  dashboard:
    build:
      context: ./web/dashboard
      dockerfile: Dockerfile
    container_name: monitoring-dashboard
    restart: always
    ports:
      - "${DASHBOARD_PORT}:80"
    depends_on:
      - api-gateway

  grafana:
    image: grafana/grafana:11.0.0
    container_name: monitoring-grafana
    restart: always
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: monitoring-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    depends_on:
      - alert-service

  rule-service:
    build:
      context: ./services/rule-service
      dockerfile: Dockerfile
    container_name: monitoring-rule-service
    restart: always
    environment:
      PORT: ${RULE_SERVICE_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      PROMETHEUS_RULES_FILE: ${PROMETHEUS_RULES_FILE}
      PROMETHEUS_RELOAD_URL: ${PROMETHEUS_RELOAD_URL}
    ports:
      - "${RULE_SERVICE_PORT}:5004"
    volumes:
      - ./infra/prometheus/rules:/etc/prometheus/rules
    depends_on:
      - postgres
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5004/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  grafana_data:
