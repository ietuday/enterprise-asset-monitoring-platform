version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "/services/asset-service"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/services/telemetry-service"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/services/alert-service"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/services/rule-service"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/services/api-gateway"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/services/auth-service"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/web/dashboard"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/services/report-service"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"