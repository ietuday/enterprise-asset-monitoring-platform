name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create env file
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config

  script-checks:
    name: Script Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check shell scripts syntax
        run: |
          bash -n scripts/e2e-smoke-test.sh
          bash -n scripts/seed.sh

  go-services:
    name: Go Services
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - asset-service
          - telemetry-service
          - alert-service
          - rule-service
          - maintenance-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Download dependencies
        working-directory: services/${{ matrix.service }}
        run: go mod download

      - name: Format check
        working-directory: services/${{ matrix.service }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Go files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: go test ./...

      - name: Build
        working-directory: services/${{ matrix.service }}
        run: |
          if [[ "${{ matrix.service }}" == "maintenance-service" ]]; then
            go build -o /tmp/${{ matrix.service }} .
          else
            go build -o /tmp/${{ matrix.service }} ./cmd
          fi

  node-services:
    name: Node Services
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci --ignore-scripts

      - name: Run lint if available
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests if available
        working-directory: services/${{ matrix.service }}
        run: npm test --if-present

  report-service:
    name: Python Report Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/report-service/requirements.txt

      - name: Install dependencies
        working-directory: services/report-service
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: services/report-service
        run: python -m pytest --cov=. --cov-report=xml

  dashboard:
    name: React Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: web/dashboard
        run: npm ci --ignore-scripts

      - name: Run dashboard tests with coverage
        working-directory: web/dashboard
        run: npm run test -- --coverage

      - name: Build dashboard
        working-directory: web/dashboard
        run: npm run build

  docker-compose:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs:
      - validate-compose
      - script-checks
      - go-services
      - node-services
      - report-service
      - dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create env file
        run: cp .env.example .env

      - name: Build Docker images
        run: docker compose build
