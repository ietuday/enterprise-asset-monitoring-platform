name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  go-services:
    name: Go Services
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - asset-service
          - telemetry-service
          - alert-service
          - rule-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Download dependencies
        working-directory: services/${{ matrix.service }}
        run: go mod download

      - name: Format check
        working-directory: services/${{ matrix.service }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Go files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: go test ./...

      - name: Build
        working-directory: services/${{ matrix.service }}
        run: go build ./cmd

  node-services:
    name: Node Services
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run lint if available
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests if available
        working-directory: services/${{ matrix.service }}
        run: npm test --if-present

  report-service:
    name: Python Report Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/report-service
        run: pip install -r requirements.txt

      - name: Import check
        working-directory: services/report-service
        run: python -m py_compile main.py

  dashboard:
    name: React Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: web/dashboard
        run: npm run build

  docker-compose:
    name: Docker Compose Validation and Build
    runs-on: ubuntu-latest
    needs:
      - go-services
      - node-services
      - report-service
      - dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker images
        run: docker compose build