name: SonarQube

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26.x"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: |
            services/api-gateway/package-lock.json
            services/auth-service/package-lock.json
            web/dashboard/package-lock.json

      - name: Prepare coverage directory
        run: mkdir -p coverage

      - name: Run Go tests with coverage
        shell: bash
        run: |
          set -e
          shopt -s nullglob

          COVERAGE_FILES=()

          for service in services/*; do
            if [ -f "$service/go.mod" ]; then
              echo "Running Go tests in $service"
              (
                cd "$service"
                go test ./... -coverprofile="../../coverage/$(basename "$service").out"
              )
              COVERAGE_FILES+=("coverage/$(basename "$service").out")
            fi
          done

          echo "mode: set" > coverage/go-coverage.out
          for file in "${COVERAGE_FILES[@]}"; do
            if [ -f "$file" ]; then
              tail -n +2 "$file" >> coverage/go-coverage.out
            fi
          done

      - name: Install dashboard dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: Run dashboard tests with coverage
        working-directory: web/dashboard
        shell: bash
        run: |
          if npm run --json | grep -q '"test"'; then
            npm test -- --coverage --watch=false
          else
            echo "No dashboard test script found"
          fi

      - name: Collect dashboard coverage
        run: |
          if [ -f web/dashboard/coverage/lcov.info ]; then
            cp web/dashboard/coverage/lcov.info coverage/lcov.info
          else
            touch coverage/lcov.info
          fi

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7

      # Optional: remove or comment this step if your SonarQube/SonarCloud setup
      # does not support waiting for a quality gate from GitHub Actions.
      - name: SonarQube Quality Gate
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496 # v1
        timeout-minutes: 5
