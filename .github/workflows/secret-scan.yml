name: Security Scan

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

  trivy-docker-scan:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    needs:
      - trivy-fs-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Build Docker images
        run: docker compose build

      - name: Scan asset-service image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enterprise-asset-monitoring-platform-asset-service:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Scan telemetry-service image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enterprise-asset-monitoring-platform-telemetry-service:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Scan alert-service image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enterprise-asset-monitoring-platform-alert-service:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Scan rule-service image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enterprise-asset-monitoring-platform-rule-service:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0